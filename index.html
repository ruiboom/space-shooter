<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STELLAR RAID</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a10;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    overflow: hidden;
    color: #555;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    background: #000;
    box-shadow: 0 0 0 2px #222, 0 0 40px #000;
  }
  .info {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    opacity: 0.55;
  }
  .info b { color: #888; }
</style>
</head>
<body>
  <canvas id="screen" width="240" height="320"></canvas>
  <div class="info">
    <b>ARROWS/WASD</b> MOVE &nbsp;·&nbsp; <b>SPACE</b> FIRE &nbsp;·&nbsp; <b>ENTER</b> CONFIRM
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
